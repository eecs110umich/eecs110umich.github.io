<?xml version="1.0" encoding="UTF-8"?>
<!-- TODO: replace banner. Placeholder only: a slim, generic computer-science
     banner. Self-contained SVG (no external assets) so the build has zero
     network dependencies. Swap in a real image (banner.jpg/png) and update
     the <img> src in index.md. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 360" role="img"
     aria-label="Abstract computer-science banner" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00274c"/>
      <stop offset="1" stop-color="#00539c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="360" fill="url(#bg)"/>
  <!-- faint code-ish motif -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3">
    <path d="M120 120 l-45 60 l45 60"/>
    <path d="M230 120 l45 60 l-45 60"/>
    <path d="M170 110 l20 140" stroke-opacity="0.16"/>
  </g>
  <g fill="#ffcb05" fill-opacity="0.9">
    <circle cx="1360" cy="120" r="10"/>
    <circle cx="1420" cy="180" r="10"/>
    <circle cx="1360" cy="240" r="10"/>
    <circle cx="1300" cy="180" r="10"/>
  </g>
  <g stroke="#ffcb05" stroke-opacity="0.5" stroke-width="2">
    <line x1="1360" y1="120" x2="1420" y2="180"/>
    <line x1="1420" y1="180" x2="1360" y2="240"/>
    <line x1="1360" y1="240" x2="1300" y2="180"/>
    <line x1="1300" y1="180" x2="1360" y2="120"/>
  </g>
</svg>
