# =============================================================================
# Python / Google Colab resource directory (Resources page).
#
# This is STABLE reference data, not semester-specific — it lives in its own data
# file so it doesn't clutter course.yml (the file instructors edit each term).
# Google Colab runs Python 3.12, so official-doc links point at the 3.12 docs.
#
# The Resources page renders every record below into a card and filters them
# client-side by `source`, by `topic`, and by a title search. To add a resource,
# append one record to `resources:` with a `source` (must match a `sources` id)
# and `topics` (each must match a `topics` id). Re-check links before each term —
# W3Schools / GeeksforGeeks occasionally reorganize URLs. (Links verified live
# 2026-07-18.)
# =============================================================================

# Filter facet: source. `id` is used on the record; `label` is the badge/button text.
sources:
  - { id: python-docs,     label: "Python 3.12 docs" }
  - { id: colab,           label: "Colab" }
  - { id: pandas-docs,     label: "pandas docs" }
  - { id: sklearn-docs,    label: "scikit-learn docs" }
  - { id: matplotlib-docs, label: "matplotlib docs" }
  - { id: realpython,      label: "Real Python" }
  - { id: w3schools,       label: "W3Schools" }
  - { id: geeksforgeeks,   label: "GeeksforGeeks" }

# Filter facet: topic. Order here is the order the topic buttons appear in.
topics:
  - { id: getting-started, label: "Getting started" }
  - { id: reference,       label: "Reference" }
  - { id: io,              label: "Input / output" }
  - { id: math,            label: "Math" }
  - { id: variables,       label: "Variables" }
  - { id: booleans,        label: "Booleans" }
  - { id: conditionals,    label: "Conditionals" }
  - { id: loops,           label: "Loops" }
  - { id: nested-loops,    label: "Nested loops" }
  - { id: break-continue,  label: "Break / continue" }
  - { id: lists,           label: "Lists" }
  - { id: dictionaries,    label: "Dictionaries" }
  - { id: functions,       label: "Functions" }
  - { id: scope,           label: "Scope" }
  - { id: libraries,       label: "Libraries" }
  - { id: pandas,          label: "pandas" }
  - { id: sklearn,         label: "scikit-learn" }
  - { id: matplotlib,      label: "matplotlib" }
  - { id: errors,          label: "Errors & exceptions" }
  - { id: debugging,       label: "Debugging" }
  - { id: images,          label: "Images" }

# Each record: title, url, source (one id), topics (one or more ids).
resources:
  # Getting started / reference
  - { title: 'Welcome to Colab (official intro notebook)', url: 'https://colab.research.google.com/notebooks/welcome.ipynb', source: colab, topics: [getting-started] }
