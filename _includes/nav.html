<nav class="site-nav" aria-label="Primary">

  <!-- ===================================================================
       LOGO SLOT — intentionally empty for now (see README, "Deferred").
       The nav is built to start at the top-left with or without a logo,
       so adding one later needs no redesign. To add it, drop a link+image
       right here, e.g.:

         <a class="nav-logo" href="/">
           <img src="/assets/img/logo.png" alt="EECS 110 logo"
                width="40" height="40">
         </a>
       =================================================================== -->

  <a class="nav-title" href="/">{{ site.data.course.course.code }}</a>
  <p class="nav-subtitle">{{ site.data.course.course.name }}</p>

  {%- assign u = page.url -%}
  <ul class="nav-links">
    <li><a href="/"          {% if u == "/" %}aria-current="page"{% endif %}>Home</a></li>
    <li><a href="/schedule/" {% if u contains "/schedule" %}aria-current="page"{% endif %}>Schedule</a></li>
    <li><a href="/staff/"    {% if u contains "/staff" %}aria-current="page"{% endif %}>Staff</a></li>
    <li><a href="/resources/"{% if u contains "/resources" %}aria-current="page"{% endif %}>Resources</a></li>
    <li><a href="/faq/"      {% if u contains "/faq" %}aria-current="page"{% endif %}>FAQ</a></li>
  </ul>
</nav>
